services:
  postgres:
    image: postgres:16
    container_name: boardinghouse-postgres
    environment:
      POSTGRES_DB: boardinghouse
      POSTGRES_USER: boardinghouse
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - boardinghouse-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: boardinghouse-redis
    ports:
      - "6379:6379"

volumes:
  boardinghouse-pgdata:
